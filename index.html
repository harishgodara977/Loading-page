<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landing Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #F9FAFB;
    }
    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: white;
    }
    .logo {
      font-weight: bold;
      color: #4F46E5;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #111827;
    }
    .btn {
      background: #4F46E5;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
    }
    .hero {
      text-align: center;
      padding: 100px 20px;
    }
    .hero h1 {
      font-size: 40px;
    }
    .features {
      display: flex;
      justify-content: space-around;
      padding: 50px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #111827;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MyBrand</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Pricing</a>
    <a href="#">Contact</a>
  </nav>
  <a class="btn">Get Started</a>
</header>

<section class="hero">
  <h1>Build Your Future Website</h1>
  <p>Simple, clean and modern landing page</p>
  <a class="btn">Start Now</a>
</section>

<section class="features">
  <div class="card">
    <h3>Fast</h3>
    <p>Lightning fast performance</p>
  </div>
  <div class="card">
    <h3>Responsive</h3>
    <p>Works on all devices</p>
  </div>
  <div class="card">
    <h3>Easy</h3>
    <p>Easy to customize</p>
  </div>
</section>

<footer>
  <p>© 2026 MyBrand. All rights reserved.</p>
</footer>

</body>
</html>
